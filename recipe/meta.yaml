{% set name = "pydpc" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/pydpc-{{ version }}.tar.gz
  sha256: 168c953d2656c73562e1fde5e9935db354669a37a91a38537c4dce5266b9f280

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [py<312]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
  host:
    - python
    - numpy >=1.7
    - cython >=0.20
    - setuptools >=0.6
    - pip
  run:
    - numpy >=2
    - python
    - matplotlib-base

test:
  imports:
    - pydpc
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/cwehmeyer/pydpc
  summary: Python package for Density Peak-based Clustering
  license: LGPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
